name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy -- -D warnings

      - name: clippy (all features)
        run: cargo clippy --features "full,mcp" -- -D warnings
        if: runner.os == 'Linux'

      - name: test (default)
        run: cargo test

      - name: test (all features)
        run: cargo test --features "full,mcp"
        if: runner.os == 'Linux'

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - run: cargo build

  bench:
    name: Benchmarks (regression gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Install critcmp for human-readable diff and threshold enforcement.
      - name: Install critcmp
        run: cargo install critcmp --locked

      # On main: run benches and upload the baseline as a cache artifact so
      # subsequent PRs can download it for comparison.
      - name: Run benchmarks (save baseline)
        if: github.ref == 'refs/heads/main'
        run: cargo bench -- --save-baseline main

      - name: Upload baseline
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: criterion-baseline
          path: target/criterion
          retention-days: 30

      # On PRs: download the saved main baseline and compare. Fail if any
      # benchmark regresses by more than 10%.
      - name: Download baseline
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@v4
        with:
          name: criterion-baseline
          path: target/criterion
        continue-on-error: true   # first PR before any baseline exists

      - name: Run benchmarks (PR)
        if: github.event_name == 'pull_request'
        run: cargo bench -- --save-baseline pr

      - name: Compare against main baseline (10% threshold)
        if: github.event_name == 'pull_request'
        run: |
          # critcmp exits non-zero when any bench is slower by more than the
          # given threshold. 0.10 = 10% regression limit.
          critcmp main pr --threshold 10 || {
            echo ""
            echo "::error::One or more benchmarks regressed by >10% vs main."
            echo "Run 'critcmp main pr' locally to inspect the diff."
            exit 1
          }

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # RUSTSEC-2024-0437: protobuf DoS via prometheus transitive dep.
          # prometheus 0.13 pins protobuf 2.x; upstream fix requires a breaking
          # API migration. Tracked for upgrade when prometheus 0.14 stabilises.
          ignore: RUSTSEC-2024-0437
