name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: Build and Test (ubuntu-latest, stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (default features)
        run: cargo clippy -- -D warnings

      - name: cargo clippy (all features)
        run: cargo clippy --features "full,mcp" -- -D warnings

      - name: cargo test (default features)
        run: cargo test

      - name: cargo test (all features)
        run: cargo test --features "full,mcp"

      - name: cargo doc
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  cross-platform:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo test
        run: cargo test

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - name: cargo build (MSRV)
        run: cargo build

  publish-dry-run:
    name: Publish dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo publish --dry-run
        run: cargo publish --dry-run

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-tarpaulin --locked
      - run: cargo tarpaulin --out Xml --engine llvm --all-features --timeout 180
      - uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

  bench:
    name: Benchmark Regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: run benchmarks
        run: cargo bench --bench pipeline 2>&1 | tee bench_output.txt
      - name: check for regression
        run: |
          # Fail if any benchmark regressed >10% vs the stored baseline.
          # On first run the baseline doesn't exist — store it and pass.
          BASELINE=".bench_baseline.txt"
          if [ ! -f "$BASELINE" ]; then
            echo "No baseline found — storing current results."
            cp bench_output.txt "$BASELINE"
            exit 0
          fi
          python3 - <<'EOF'
          import re, sys

          def parse(path):
              times = {}
              for line in open(path):
                  m = re.search(r'test (\S+) .* bench:\s+([\d,]+) ns', line)
                  if m:
                      times[m.group(1)] = int(m.group(2).replace(',', ''))
              return times

          base = parse(".bench_baseline.txt")
          curr = parse("bench_output.txt")
          regressions = []
          for name, base_ns in base.items():
              if name not in curr:
                  continue
              curr_ns = curr[name]
              pct = (curr_ns - base_ns) / base_ns * 100
              if pct > 10:
                  regressions.append(f"  {name}: {base_ns} ns -> {curr_ns} ns (+{pct:.1f}%)")
          if regressions:
              print("BENCHMARK REGRESSIONS DETECTED (>10%):")
              for r in regressions:
                  print(r)
              sys.exit(1)
          print(f"All {len(curr)} benchmarks within 10% of baseline.")
          EOF

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # RUSTSEC-2024-0437: protobuf DoS via prometheus transitive dep.
          # prometheus 0.13 pins protobuf 2.x; upstream fix requires a breaking
          # API migration. Tracked for upgrade when prometheus 0.14 stabilises.
          ignore: RUSTSEC-2024-0437
