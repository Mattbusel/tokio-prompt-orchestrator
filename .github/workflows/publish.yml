name: Publish to crates.io

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: verify version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CRATE_VER=$(cargo metadata --no-deps --format-version 1 \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['packages'][0]['version'])")
          if [ "$TAG" != "$CRATE_VER" ]; then
            echo "Tag $TAG does not match Cargo.toml version $CRATE_VER"
            exit 1
          fi

      - name: dry-run publish
        run: cargo publish --dry-run --allow-dirty

      - name: publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
