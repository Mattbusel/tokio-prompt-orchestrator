name: Benchmark Regression Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  bench:
    name: Benchmarks (10% regression gate)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust toolchain & cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      - name: Install critcmp
        run: cargo install critcmp --locked

      # ── main branch: run benches and save baseline as a CI artifact ─────────
      - name: Run benchmarks and save baseline (main)
        if: github.ref == 'refs/heads/main'
        run: cargo bench -- --save-baseline main

      - name: Upload Criterion baseline
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: criterion-baseline
          path: target/criterion
          retention-days: 30

      # ── PRs: compare against stored main baseline ───────────────────────────
      - name: Download Criterion baseline
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@v4
        with:
          name: criterion-baseline
          path: target/criterion
        continue-on-error: true   # OK if no baseline yet (first PR)

      - name: Run benchmarks (PR)
        if: github.event_name == 'pull_request'
        run: cargo bench -- --save-baseline pr

      - name: Compare against main baseline (10% regression threshold)
        if: github.event_name == 'pull_request'
        run: |
          # critcmp exits non-zero when any bench is slower by > threshold %.
          # 10 = 10% regression limit.
          critcmp main pr --threshold 10 || {
            echo ""
            echo "::error::One or more benchmarks regressed >10% vs main."
            echo "Run 'critcmp main pr' locally to inspect the diff."
            exit 1
          }

      # ── bencher-format output for both branches (informational) ─────────────
      - name: Emit bencher-format output
        if: always()
        run: |
          cargo bench -- --output-format bencher 2>/dev/null | tee bench_output.txt || true

      - name: Upload bencher output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-output-${{ github.sha }}
          path: bench_output.txt
          retention-days: 14
